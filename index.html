<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-white">

    <div class="container mx-auto px-4 py-8 min-h-screen flex flex-col items-center">
        <!-- Header -->
        <header class="w-full max-w-6xl text-center mb-8">
            <h1 class="text-4xl font-bold tracking-tight text-white sm:text-5xl">Advanced Sorting Visualizer</h1>
            <p class="mt-4 text-lg text-gray-400">Select an algorithm, generate an array, and watch it work!</p>
        </header>

        <!-- Controls -->
        <div id="controls" class="controls w-full max-w-6xl bg-gray-800 p-4 rounded-lg shadow-lg mb-8 flex flex-wrap items-center justify-center gap-4">
            <button id="generateArrayBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md">Generate New Array</button>
            
            <select id="algorithmSelect" class="bg-gray-700 text-white py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="quick">Quick Sort</option>
            </select>

            <button id="startSortBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg shadow-md">Start Sorting</button>
            <button id="stopSortBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md" disabled>Stop</button>
            
            <div class="flex items-center gap-3">
                <label for="arraySize" class="font-medium text-gray-300">Size:</label>
                <input type="range" id="arraySize" min="10" max="150" value="75" class="slider-thumb w-32 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <span id="arraySizeValue" class="font-mono text-gray-300">75</span>
            </div>
            
            <div class="flex items-center gap-3">
                <label for="speed" class="font-medium text-gray-300">Speed:</label>
                <input type="range" id="speed" min="0" max="500" value="1000" class="slider-thumb w-32 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                 <span id="speedValue" class="font-mono text-gray-300">1.0s</span>
            </div>
        </div>

        <!-- Visualizer Container -->
        <div id="visualizer" class="w-full max-w-6xl min-h-[24rem] bg-gray-800 rounded-lg shadow-inner flex items-end justify-center p-4">
            <!-- Bars will be generated here by JavaScript -->
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
